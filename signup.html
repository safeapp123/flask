<!DOCTYPE html>
<html lang="en">

<head>
    <title>Sign Up - I'M SAFE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #fff5fb;
            color: #333;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 480px;
            text-align: center;
        }

        .box {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid #fce7f3;
        }

        h2 {
            color: #d4006c;
            margin-bottom: 20px;
            margin-top: 0;
        }

        .section-title {
            text-align: left;
            font-size: 11px;
            color: #64748b;
            margin: 18px 0 5px 2px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            background: #fdf2f8;
            border: 1px solid #fbcfe8;
            border-radius: 10px;
            color: #333;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #d4006c;
            background: white;
            box-shadow: 0 0 0 3px rgba(212, 0, 108, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        .btn-blue {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #ff5b8a, #d4006c);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(212, 0, 108, 0.2);
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-blue:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .login-link {
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .login-link a {
            color: #d4006c;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <h2>Create Account</h2>
            <form action="/signup" method="POST">

                <div class="section-title">Personal Details</div>
                <div class="input-row">
                    <input type="text" name="first_name" placeholder="First Name" required>
                    <input type="text" name="last_name" placeholder="Last Name" required>
                </div>

                <div class="input-row">
                    <input type="date" name="dob" title="Date of Birth" required>
                    <input type="number" name="age" placeholder="Age" min="1" max="120" required>
                </div>

                <div class="section-title">Residential Info (India)</div>
                <input type="text" name="address" placeholder="Residential Address" required>

                <div class="input-row">
                    <input type="text" name="country" value="India" readonly>
                    <select name="state" required>
                        <option value="" disabled selected>Select State/UT</option>
                        <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                        <option value="Assam">Assam</option>
                        <option value="Bihar">Bihar</option>
                        <option value="Chandigarh">Chandigarh</option>
                        <option value="Chhattisgarh">Chhattisgarh</option>
                        <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and
                            Diu</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Goa">Goa</option>
                        <option value="Gujarat">Gujarat</option>
                        <option value="Haryana">Haryana</option>
                        <option value="Himachal Pradesh">Himachal Pradesh</option>
                        <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                        <option value="Jharkhand">Jharkhand</option>
                        <option value="Karnataka">Karnataka</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Ladakh">Ladakh</option>
                        <option value="Lakshadweep">Lakshadweep</option>
                        <option value="Madhya Pradesh">Madhya Pradesh</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Manipur">Manipur</option>
                        <option value="Meghalaya">Meghalaya</option>
                        <option value="Mizoram">Mizoram</option>
                        <option value="Nagaland">Nagaland</option>
                        <option value="Odisha">Odisha</option>
                        <option value="Puducherry">Puducherry</option>
                        <option value="Punjab">Punjab</option>
                        <option value="Rajasthan">Rajasthan</option>
                        <option value="Sikkim">Sikkim</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                        <option value="Telangana">Telangana</option>
                        <option value="Tripura">Tripura</option>
                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                        <option value="Uttarakhand">Uttarakhand</option>
                        <option value="West Bengal">West Bengal</option>
                    </select>
                </div>

                <div class="section-title">Account Security</div>
                <input type="text" name="username" placeholder="Username" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required>

                <div class="section-title">Emergency Medical ID</div>
                <div class="input-row">
                    <select name="blood_group" required>
                        <option value="" disabled selected>Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                    <select name="organ_donor" required>
                        <option value="" disabled selected>Organ Donor?</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="input-row">
                    <input type="text" name="height" placeholder="Height (cm)" required>
                    <input type="text" name="weight" placeholder="Weight (kg)" required>
                </div>

                <div class="input-row">
                    <input type="text" name="primary_emergency_phone" placeholder="Emergency Contact Ph." required>
                    <input type="text" name="physician_phone" placeholder="Family Doctor Ph. (Optional)">
                </div>

                <input type="text" name="allergies" placeholder="Known Allergies (e.g. Peanut, Penicillin)" required>

                <textarea name="current_meds" placeholder="Current Medications & Dosages (e.g. Insulin 10ml)"
                    required></textarea>

                <textarea name="medical_history" placeholder="Chronic Conditions (e.g. Diabetes, Heart Condition)"
                    required></textarea>

                <textarea name="physical_limitations"
                    placeholder="Physical Disabilities or Limitations (if any)"></textarea>

                <button type="submit" class="btn-blue">Sign Up</button>
            </form>
            <div class="login-link">
                Already have an account? <a href="/login">Log in</a>
            </div>
        </div>
    </div>
</body>

</html>
