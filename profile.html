<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Medical History - I'M SAFE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #fff5fb;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            text-decoration: none;
            color: #d4006c;
            font-size: 20px;
            margin-right: 15px;
        }

        .header h2 {
            margin: 0;
            color: #d4006c;
            font-size: 22px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            background: #f8fafc;
            transition: border 0.3s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #d4006c;
            background: #fff;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        .save-btn {
            background: #d4006c;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(212, 0, 108, 0.3);
        }

        .save-btn:active {
            transform: scale(0.98);
        }

        .info-msg {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 15px;
        }

        .voice-settings h3 {
            margin-top: 0;
            color: #d4006c;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .current-phrase {
            margin-top: 12px;
            font-size: 14px;
            color: #475569;
            background: #f1f5f9;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="/home" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2>Medical Profile</h2>
    </div>

    <div class="card">
        <form action="/update_profile" method="POST">

            <div class="form-group">
                <label>Blood Group</label>
                <select name="blood_group">
                    <option value="A+" {% if user.blood_group=='A+' %}selected{% endif %}>A+</option>
                    <option value="A-" {% if user.blood_group=='A-' %}selected{% endif %}>A-</option>
                    <option value="B+" {% if user.blood_group=='B+' %}selected{% endif %}>B+</option>
                    <option value="B-" {% if user.blood_group=='B-' %}selected{% endif %}>B-</option>
                    <option value="O+" {% if user.blood_group=='O+' %}selected{% endif %}>O+</option>
                    <option value="O-" {% if user.blood_group=='O-' %}selected{% endif %}>O-</option>
                    <option value="AB+" {% if user.blood_group=='AB+' %}selected{% endif %}>AB+</option>
                    <option value="AB-" {% if user.blood_group=='AB-' %}selected{% endif %}>AB-</option>
                </select>
            </div>

            <div class="form-group">
                <label>Organ Donor Status</label>
                <select name="organ_donor">
                    <option value="Yes" {% if user.organ_donor=='Yes' %}selected{% endif %}>Yes</option>
                    <option value="No" {% if user.organ_donor=='No' %}selected{% endif %}>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Allergies & Reactions</label>
                <textarea name="allergies" placeholder="e.g. Penicillin, Peanuts...">{{ user.allergies }}</textarea>
            </div>

            <div class="form-group">
                <label>Medical History</label>
                <textarea name="medical_history"
                    placeholder="e.g. Asthma, Diabetes, Heart Condition...">{{ user.medical_history }}</textarea>
            </div>

            <div class="form-group">
                <label>Current Medications</label>
                <textarea name="current_meds"
                    placeholder="List medications you take daily...">{{ user.current_meds }}</textarea>
            </div>

            <div class="form-group">
                <label>Emergency Contact Number</label>
                <input type="tel" name="primary_emergency_phone" value="{{ user.primary_emergency_phone }}"
                    placeholder="Phone number">
            </div>

            <button type="submit" class="save-btn">SAVE CHANGES</button>
        </form>
    </div>

    <div class="card voice-settings">
        <h3><i class="fas fa-microphone"></i> Voice Trigger Settings</h3>
        <form action="/update_voice_phrase" method="POST">
            <div class="form-group">
                <label>Custom SOS Phrase</label>
                <input type="text" name="trigger_phrase" placeholder="e.g. HELP HELP or DANGER" required>
            </div>
            <button type="submit" class="save-btn">UPDATE SOS PHRASE</button>
        </form>
        <div class="current-phrase">
            Current SOS Phrase: <strong>{{ trigger['trigger_phrase'] if trigger else 'HELP HELP' }}</strong>
        </div>
    </div>

    <p class="info-msg"><i class="fas fa-shield-alt"></i> This data is visible to emergency responders via your Medical
        ID.</p>

</body>

</html>
