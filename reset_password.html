<!DOCTYPE html>
<html>

<head>
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: #fff5fb;
            font-family: 'Segoe UI', Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            width: 350px;
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            border: 1px solid #fbcfe8;
            box-shadow: 0 10px 25px rgba(212, 0, 108, 0.08);
            text-align: center;
            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-2px);
        }

        h2 {
            color: #d4006c;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
        }

        .back {
            display: block;
            text-align: left;
            color: #d4006c;
            font-size: 14px;
            margin-bottom: 10px;
            text-decoration: none;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #d4006c;
            box-shadow: 0 0 0 2px rgba(212, 0, 108, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(to right, #ff2d8d, #d4006c);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .error {
            color: #ed4956;
            margin-top: 12px;
            font-size: 14px;
        }

        .strength {
            font-size: 13px;
            margin-top: -5px;
            margin-bottom: 10px;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="box">

        <a href="/login" class="back">← Back</a>

        <h2>Reset Password</h2>
        <p class="subtitle">Create a new secure password</p>

        <form onsubmit="return validatePassword()" action="/update_password" method="POST">

            <input type="password" id="pass" name="password" placeholder="New Password" required>
            <div id="strength" class="strength"></div>

            <input type="password" id="confirm" placeholder="Confirm Password" required>

            <button type="submit">Update Password</button>
        </form>

        <p id="error" class="error"></p>
    </div>

    <script>
        const pass = document.getElementById("pass");
        const strength = document.getElementById("strength");

        pass.addEventListener("input", () => {
            let val = pass.value;

            if (val.length < 6) {
                strength.innerText = "Weak password";
                strength.style.color = "red";
            }
            else if (val.match(/[A-Z]/) && val.match(/[0-9]/)) {
                strength.innerText = "Strong password";
                strength.style.color = "green";
            }
            else {
                strength.innerText = "Medium password";
                strength.style.color = "orange";
            }
        });

        function validatePassword() {
            const p = pass.value;
            const c = document.getElementById("confirm").value;

            if (p !== c) {
                document.getElementById("error").innerText = "Passwords do not match";
                return false;
            }

            if (p.length < 6) {
                document.getElementById("error").innerText = "Password must be at least 6 characters";
                return false;
            }

            return true;
        }
    </script>

</body>

</html>
