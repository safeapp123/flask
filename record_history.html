<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recording History</title>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            color: #c40069;
        }

        .rec-card {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }

        .details b {
            font-size: 15px;
            color: #333;
        }

        .details p {
            margin: 2px 0;
            color: #888;
            font-size: 12px;
        }

        .view-btn {
            background: #7b2ff7;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -2px 6px rgba(0, 0, 0, 0.1);
        }

        .nav-link {
            text-decoration: none;
            color: #444;
            font-size: 12px;
            text-align: center;
        }

        .nav-link i {
            font-size: 20px;
            display: block;
            margin-bottom: 3px;
        }

        .active-nav {
            color: #c40069;
        }
    </style>
</head>

<body>

    <!-- Back Button + Header -->
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
        <a href="/record" style="text-decoration:none; color:#c40069;">
            <i class="fas fa-arrow-left" style="font-size:20px;"></i>
        </a>
        <h2 class="header" style="margin:0;">My History</h2>
    </div>

    <p style="color: #666; font-size: 14px; margin-bottom: 25px;">
        Review your personal emergency recordings.
    </p>

    {% for rec in recordings %}
    <div class="rec-card">
        <div class="details">
            <b>Emergency Recording</b>
            <p>{{ rec.timestamp }}</p>
        </div>
        <a href="{{ url_for('static', filename='recordings/' + rec.file_name) }}" class="view-btn"
            target="_blank">View</a>
    </div>
    {% else %}
    <div style="text-align: center; margin-top: 50px; color: #bbb;">
        <p>No recordings found in your history.</p>
    </div>
    {% endfor %}

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="/home" class="nav-link">
            <i class="fas fa-house"></i>
            Home
        </a>
        <a href="/record" class="nav-link">
            <i class="fas fa-video"></i>
            Record
        </a>
        <a href="/contacts" class="nav-link">
            <i class="fas fa-address-book"></i>
            Contacts
        </a>
        <a href="/aichats" class="nav-link">
            <i class="fas fa-comment-dots"></i>
            AI Chat
        </a>
    </div>

</body>

</html>
