<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: #fff5fb;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            width: 350px;
            background: white;
            padding: 35px 25px;
            /* ✅ balanced padding */
            border-radius: 20px;
            border: 1px solid #fbcfe8;
            box-shadow: 0 10px 25px rgba(212, 0, 108, 0.08);
            text-align: center;
            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-2px);
            /* 🔥 premium feel */
        }

        h2 {
            color: #d4006c;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0 15px 0;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #d4006c;
            box-shadow: 0 0 0 2px rgba(212, 0, 108, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #ff2d8d, #d4006c);
            /* 🔥 gradient */
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .msg {
            margin-top: 12px;
            color: #ed4956;
            font-size: 14px;
        }

        .back {
            display: block;
            text-align: left;
            color: #d4006c;
            font-size: 14px;
            margin-bottom: 10px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="box">

        <a href="/login" class="back">← Back</a>

        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your email to receive OTP</p>

        <input type="email" id="email" placeholder="Enter your email">

        <button onclick="sendOTP()" id="btn">Send OTP</button>

        <p id="msg" class="msg"></p>
    </div>

    <script>
        function sendOTP() {
            const btn = document.getElementById("btn");

            btn.innerText = "Sending...";
            btn.disabled = true;

            fetch("/send_reset_otp", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: document.getElementById("email").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    btn.innerText = "Send OTP";
                    btn.disabled = false;

                    if (data.status === "success") {
                        alert("OTP sent!");
                        window.location.href = "/verify_reset_otp";
                    } else {
                        document.getElementById("msg").innerText = data.message;
                    }
                })
                .catch(() => {
                    btn.innerText = "Send OTP";
                    btn.disabled = false;
                    document.getElementById("msg").innerText = "Server error";
                });
        }
    </script>

</body>

</html>
